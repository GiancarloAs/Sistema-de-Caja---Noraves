
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Caja - Canjes Ultraseguros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; position: relative; }
        input, select { width: 85%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; text-align: center; }
        input[type="text"] { text-transform: uppercase; }
        button { width: 90%; padding: 12px; background: #24b47e; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        .info-cliente { margin-top: 20px; padding: 15px; border-radius: 4px; background: #eef9f5; display: none; text-align: left; }
        .alerta { color: red; margin-top: 10px; font-weight: bold; text-align: center; }
        .tienda-tag { background: #24b47e; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; float: right; font-weight: bold; }
        .seccion-seguridad { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #24b47e; background: #fff3cd; padding: 10px; border-radius: 4px; }
        .campo-boleta { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; }
        .badge-verificado { color: #155724; background-color: #d4edda; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; float: right; display: none; }
    </style>
</head>
<body>

<div id="pantallaLogin" class="card">
    <h2>Acceso de Caja</h2>
    <p style="color: #666; font-size: 14px;">Selecciona tu sucursal e ingresa la contraseña</p>
    
    <select id="selectTienda">
        <option value="Tienda Larco">Tienda Larco</option>
        <option value="Tienda Ingeniería">Tienda Ingeniería</option>
    </select>
    <p style="color: #666; font-size: 14px;">Ingresa la contraseña para Tienda Larco</p>

    <input type="password" id="passTienda" placeholder="Contraseña de cajero">
    <button onclick="loginTienda()">Ingresar al Panel</button>
    <div id="errorLogin" class="alerta"></div>
</div>

<div id="pantallaCanje" class="card" style="display: none;">
    <div>
        <span id="tagTiendaActiva" class="tienda-tag"></span>
        <h2 style="text-align: left; margin-top: 0;">Validación</h2>
    </div>
    <input type="text" id="codigoInput" placeholder="Introduce el código">
    <button id="btnBuscar" onclick="buscarCodigo()">Buscar Código</button>

    <div id="errorMsg" class="alerta"></div>

    <div id="seccionCliente" class="info-cliente">
        <span id="badgeOk" class="badge-verificado">✓ IDENTIDAD CONFIRMADA</span>
        <p><strong>Cliente:</strong> <span id="nombreCliente"></span></p>
        <p><strong>Teléfono:</strong> <span id="telefonoCliente"></span></p>
        <p><strong>Empresa:</strong> <span id="empresaCliente"></span></p>
        <p><strong>Estado del Cupón:</strong> <span id="estadoCodigo"></span></p>

        <div id="bloqueSeguridad" class="seccion-seguridad" style="display: none;">
            <label style="font-size: 13px; font-weight: bold; color: #856404; display: block; margin-bottom: 5px;">
                ⚠️ FILTRO DE SEGURIDAD: Pregunte al cliente los últimos 3 dígitos de su DNI:
            </label>
            <input type="text" id="verificarDniInput" maxlength="3" placeholder="Ej: 432" style="width: 50%; padding: 8px; font-size: 18px; letter-spacing: 3px;" oninput="validarFiltros()">
            <div id="errorDniMsg" style="color: red; font-size: 12px; margin-top: 5px; font-weight: bold;"></div>
        </div>

        <div id="seccionBoleta" class="campo-boleta" style="display: none;">
            <label style="font-size: 14px; font-weight: bold; color: #333;">Número de Boleta emitida (Obligatorio):</label>
            <input type="text" id="boletaInput" placeholder="Ej: B001-0004321" oninput="validarFiltros()">
        </div>

        <button id="btnCanjear" onclick="canjearCodigo()" disabled>Complete los filtros</button>
    </div>

    <p style="margin-top: 25px; font-size: 12px;"><a href="#" onclick="cerrarSesion()" style="color: #666;">Cerrar Sesión de Caja</a></p>
</div>

<script>
  const SUPABASE_URL = "https://aollztxtygxarlueflxq.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvbGx6dHh0eWd4YXJsdWVmbHhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMjU0NzMsImV4cCI6MjA5ODYwMTQ3M30.v3LIghE_kbpab9j2fVx_qmawKbbsTCX0ZxsoyeZRo-Q";
  const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let codigoActual = "";
  let tiendaActiva = ""; // Solo se declara una vez

  function loginTienda() {
      const tienda = document.getElementById("selectTienda").value;
      const pass = document.getElementById("passTienda").value;
      const errorLogin = document.getElementById("errorLogin");

      errorLogin.innerText = "";

      // Verificación simplificada y corregida
      if ((tienda === "Tienda Larco" && pass === "tienlar01") || 
          (tienda === "Tienda Ingeniería" && pass === "tieninge01")) {
          
          tiendaActiva = tienda;
          document.getElementById("tagTiendaActiva").innerText = tiendaActiva;
          document.getElementById("pantallaLogin").style.display = "none";
          document.getElementById("pantallaCanje").style.display = "block";
          document.getElementById("passTienda").value = "";
      } else {
          errorLogin.innerText = "❌ Contraseña incorrecta.";
      }
  }

  function cerrarSesion() {
      tiendaActiva = "";
      document.getElementById("pantallaCanje").style.display = "none";
      document.getElementById("pantallaLogin").style.display = "block";
      document.getElementById("codigoInput").value = "";
      document.getElementById("seccionCliente").style.display = "none";
      document.getElementById("errorMsg").innerText = "";
  }

  async function buscarCodigo() {
      const input = document.getElementById("codigoInput");
      codigoActual = input.value.trim().toUpperCase();

      const errorMsg = document.getElementById("errorMsg");
      const seccionCliente = document.getElementById("seccionCliente");
      const bloqueSeguridad = document.getElementById("bloqueSeguridad");
      const seccionBoleta = document.getElementById("seccionBoleta");
      const btnCanjear = document.getElementById("btnCanjear");
      const badgeOk = document.getElementById("badgeOk");

      errorMsg.innerText = "";
      document.getElementById("errorDniMsg").innerText = "";
      seccionCliente.style.display = "none";
      bloqueSeguridad.style.display = "none";
      seccionBoleta.style.display = "none";
      badgeOk.style.display = "none";
      document.getElementById("verificarDniInput").value = "";
      document.getElementById("boletaInput").value = "";

      if (!codigoActual) return;

      const { data, error } = await _supabase
        .from('cupones')
        .select('estado, clientes(nombre, dni, telefono, empresa)')
        .eq('codigo', codigoActual)
        .maybeSingle();

      if (error || !data) {
          errorMsg.innerText = "❌ Código inválido o no existe.";
          return;
      }

      const datosCliente = data.clientes || data['clientes!cupones_cliente_id_fkey'];

      document.getElementById("nombreCliente").innerText = datosCliente ? datosCliente.nombre : "No registrado";
      document.getElementById("telefonoCliente").innerText = datosCliente && datosCliente.telefono ? datosCliente.telefono : "No registrado";
      document.getElementById("empresaCliente").innerText = datosCliente && datosCliente.empresa ? datosCliente.empresa : "No registrado";

      if (datosCliente && datosCliente.dni) {
          // Asignación única corregida
          let dniLimpio = datosCliente.dni.toString().trim();
          ultimosDigitosDniCorrectos = dniLimpio.slice(-3);
      } else {
          ultimosDigitosDniCorrectos = "000";
      }

      const txtEstado = document.getElementById("estadoCodigo");
      seccionCliente.style.display = "block";

      if (data.estado === 'canjeado') {
          txtEstado.innerHTML = "<span style='color:red;'>YA CANJEADO</span>";
          btnCanjear.disabled = true;
          btnCanjear.innerText = "No disponible";
      } else {
          txtEstado.innerHTML = "<span style='color:green;'>DISPONIBLE</span>";
          bloqueSeguridad.style.display = "block";
          seccionBoleta.style.display = "block";
          btnCanjear.disabled = true;
          btnCanjear.innerText = "Complete los filtros";
      }
  }

  function validarFiltros() {
      const inputDniCaja = document.getElementById("verificarDniInput").value.trim();
      const boletaTxt = document.getElementById("boletaInput").value.trim();
      const btnCanjear = document.getElementById("btnCanjear");
      const errorDniMsg = document.getElementById("errorDniMsg");
      const badgeOk = document.getElementById("badgeOk");

      errorDniMsg.innerText = "";
      badgeOk.style.display = "none";

      if (inputDniCaja.length < 3) {
          btnCanjear.disabled = true;
          btnCanjear.innerText = "Falta responder DNI";
          return;
      }

      if (inputDniCaja !== ultimosDigitosDniCorrectos) {
          errorDniMsg.innerText = "❌ Los dígitos no coinciden.";
          btnCanjear.disabled = true;
          btnCanjear.innerText = "DNI Incorrecto";
          return;
      }

      badgeOk.style.display = "inline-block";

      if (boletaTxt.length === 0) {
          btnCanjear.disabled = true;
          btnCanjear.innerText = "Ingrese Boleta (Obligatorio)";
          return;
      }

      btnCanjear.disabled = false;
      btnCanjear.innerText = "Confirmar Canje";
  }

  async function canjearCodigo() {
      const btnCanjear = document.getElementById("btnCanjear");
      const boletaValor = document.getElementById("boletaInput").value.trim().toUpperCase();

      btnCanjear.disabled = true;
      btnCanjear.innerText = "Procesando...";

      const { error } = await _supabase
          .from('cupones')
          .update({
               estado: 'canjeado',
               fecha_canje: new Date().toISOString(),
               tienda_canje: tiendaActiva,
               nro_boleta: boletaValor
          })
          .eq('codigo', codigoActual);

      if (error) {
          alert("Hubo un error al procesar el canje.");
          btnCanjear.disabled = false;
          btnCanjear.innerText = "Confirmar Canje";
      } else {
          document.getElementById("estadoCodigo").innerHTML = "<span style='color:red;'>CANJEADO CON ÉXITO</span>";
          document.getElementById("bloqueSeguridad").style.display = "none";
          document.getElementById("seccionBoleta").style.display = "none";
          btnCanjear.innerText = "¡Canjeado!";
      }
  }
</script>
</body>
</html>
