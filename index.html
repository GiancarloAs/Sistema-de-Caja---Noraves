<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Caja - Canjes Ultraseguros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; position: relative; }
        input, select { width: 85%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; text-align: center; }
        input[type="text"] { text-transform: uppercase; }
        button { width: 90%; padding: 12px; background: #24b47e; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        .alerta { color: red; margin-top: 10px; font-weight: bold; text-align: center; }
        .alerta.exito { color: #155724; background-color: #d4edda; padding: 10px; border-radius: 4px; }
        .tienda-tag { background: #24b47e; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; float: right; font-weight: bold; }
        .info-cliente { margin-top: 20px; padding: 15px; border-radius: 4px; background: #eef9f5; display: none; text-align: left; }
        .info-exito { margin-top: 20px; padding: 15px; border-radius: 4px; background: #d4edda; display: none; text-align: center; }
        .badge-verificado { color: #155724; background-color: #d4edda; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; float: right; display: none; }
        .contenedor-botones { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .contenedor-botones button { width: 48%; flex: 1; min-width: 120px; }
        .btn-secundario { background: #6c757d; }
        .btn-secundario:hover:not(:disabled) { background: #5a6268; }
        .seccion-cupones { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; display: none; }
        .detalles-canje { margin-top: 15px; padding: 10px; background: #f0f0f0; border-radius: 4px; font-size: 12px; text-align: left; display: none; }
        .detalles-canje p { margin: 5px 0; }
    </style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="pantallaLogin" class="card">
    <h2>Acceso de Caja</h2>
    <p style="color: #666; font-size: 14px;">Ingresa la contraseña de Tienda Larco</p>
    <input type="password" id="passTienda" placeholder="Contraseña de cajero">
    <button onclick="loginTienda()">Ingresar al Panel</button>
    <div id="errorLogin" class="alerta"></div>
</div>

<!-- PANTALLA DE CANJE -->
<div id="pantallaCanje" class="card" style="display: none;">
    <div>
        <span id="tagTiendaActiva" class="tienda-tag"></span>
        <h2 style="text-align: left; margin-top: 0;">Validación de Canje</h2>
    </div>

    <!-- PASO 1: VALIDAR DNI -->
    <div id="pasoDNI">
        <p style="color: #666; font-size: 14px;">Paso 1: Ingresa el DNI del cliente</p>
        <input type="text" id="dniInput" placeholder="DNI" maxlength="8">
        <button onclick="validarDNI()">Validar DNI</button>
        <div id="errorDNI" class="alerta"></div>
    </div>

    <!-- INFORMACIÓN DEL CLIENTE (Mostrada después de validar DNI) -->
    <div id="infoDniValidado" class="info-cliente" style="display: none;">
        <span id="badgeOk" class="badge-verificado" style="display: inline;">✓ IDENTIDAD CONFIRMADA</span>
        <p><strong>Cliente:</strong> <span id="nombreCliente"></span></p>
        <p><strong>Empresa:</strong> <span id="empresaCliente"></span></p>
    </div>

    <!-- PASO 2: INGRESAR NÚMERO DE CUPÓN -->
    <div id="pasoCupon" class="seccion-cupones">
        <p style="color: #666; font-size: 14px;">Paso 2: Ingresa el número de cupón</p>
        <input type="text" id="numeroCuponInput" placeholder="Número de cupón">
        <button onclick="canjearCupon()">Canjear Cupón</button>
        <div id="errorCupon" class="alerta"></div>
    </div>

    <!-- MENSAJE DE ÉXITO -->
    <div id="infoExito" class="info-exito" style="display: none;">
        <h3 style="color: #155724; margin-top: 0;">✓ Canje Exitoso</h3>
        <p style="color: #155724;"><strong>El cupón ha sido canjeado correctamente</strong></p>
    </div>

    <!-- DETALLES DEL CANJE -->
    <div id="detallesCanje" class="detalles-canje">
        <p><strong>Sede:</strong> <span id="detalleSede"></span></p>
        <p><strong>Fecha:</strong> <span id="detalleFecha"></span></p>
        <p><strong>Hora:</strong> <span id="detalleHora"></span></p>
        <p><strong>Número de Boleta:</strong> <span id="detalleBoleta"></span></p>
    </div>

    <!-- BOTONES DE ACCIÓN (Mostrados después del canje) -->
    <div id="botonesFinales" class="contenedor-botones" style="display: none;">
        <button onclick="resetearFormulario()">Canjear Otro</button>
        <button class="btn-secundario" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
</div>

<script>
    // ===== CONFIGURACIÓN SUPABASE =====
    const SUPABASE_URL = 'https://tu-supabase-url.supabase.co';
    const SUPABASE_KEY = 'tu-supabase-key';
    let supabase;

    // Variables globales
    let clienteDniActual = null;
    let clienteActual = null;
    let numeroBoletaActual = null;

    // ===== INICIALIZAR SUPABASE =====
    async function inicializarSupabase() {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    // ===== GENERAR NÚMERO DE BOLETA =====
    function generarNumeroBoleta() {
        // Formato: LARCO-YYYYMMDD-HHMMSS-RANDOM
        const ahora = new Date();
        const fecha = ahora.toISOString().split('T')[0].replace(/-/g, '');
        const hora = ahora.getHours().toString().padStart(2, '0') + 
                     ahora.getMinutes().toString().padStart(2, '0') + 
                     ahora.getSeconds().toString().padStart(2, '0');
        const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
        return `LARCO-${fecha}-${hora}-${random}`;
    }

    // ===== OBTENER FECHA Y HORA ACTUAL =====
    function obtenerFechaHoraActual() {
        const ahora = new Date();
        const fecha = ahora.toLocaleDateString('es-PE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        const hora = ahora.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        return { fecha, hora, timestamp: ahora };
    }

    // ===== LOGIN DE TIENDA =====
    async function loginTienda() {
        const pass = document.getElementById('passTienda').value;
        const errorDiv = document.getElementById('errorLogin');
        
        if (!pass) {
            errorDiv.textContent = 'Ingresa la contraseña';
            return;
        }

        // Aquí valida contra tu contraseña (cambiar según tu lógica)
        if (pass === 'tu-contraseña-tienda') {
            document.getElementById('pantallaLogin').style.display = 'none';
            document.getElementById('pantallaCanje').style.display = 'block';
            document.getElementById('tagTiendaActiva').textContent = 'Tienda Larco';
            limpiarFormulario();
        } else {
            errorDiv.textContent = 'Contraseña incorrecta';
        }
    }

    // ===== VALIDAR DNI =====
    async function validarDNI() {
        const dni = document.getElementById('dniInput').value.trim();
        const errorDiv = document.getElementById('errorDNI');
        
        errorDiv.textContent = '';

        if (!dni) {
            errorDiv.textContent = 'Ingresa un DNI';
            return;
        }

        if (!/^\d{8}$/.test(dni)) {
            errorDiv.textContent = 'El DNI debe tener 8 dígitos';
            return;
        }

        try {
            // Buscar cliente por DNI en la tabla 'clientes'
            const { data, error } = await supabase
                .from('clientes')
                .select('id, dni, nombre, empresa, bloqueado')
                .eq('dni', dni)
                .single();

            if (error || !data) {
                errorDiv.textContent = 'DNI no encontrado en la base de datos';
                return;
            }

            // Verificar si el cliente está bloqueado
            if (data.bloqueado === true) {
                errorDiv.textContent = 'Este cliente está bloqueado y no puede canjear cupones';
                return;
            }

            // Guardar datos del cliente
            clienteDniActual = dni;
            clienteActual = data;

            // Mostrar información del cliente
            document.getElementById('nombreCliente').textContent = data.nombre || 'N/A';
            document.getElementById('empresaCliente').textContent = data.empresa || 'N/A';
            document.getElementById('infoDniValidado').style.display = 'block';
            document.getElementById('pasoDNI').style.display = 'none';
            document.getElementById('pasoCupon').style.display = 'block';

        } catch (error) {
            console.error('Error al validar DNI:', error);
            errorDiv.textContent = 'Error al validar DNI: ' + error.message;
        }
    }

    // ===== CANJEAR CUPÓN =====
    async function canjearCupon() {
        const numeroCupon = document.getElementById('numeroCuponInput').value.trim();
        const errorDiv = document.getElementById('errorCupon');

        errorDiv.textContent = '';

        if (!numeroCupon) {
            errorDiv.textContent = 'Ingresa el número de cupón';
            return;
        }

        try {
            // Buscar el cupón en la tabla 'cupones'
            const { data: cupon, error: errorBusqueda } = await supabase
                .from('cupones')
                .select('id, numero_cupon, estado')
                .eq('numero_cupon', numeroCupon)
                .single();

            if (errorBusqueda || !cupon) {
                errorDiv.textContent = 'Cupón no encontrado';
                return;
            }

            if (cupon.estado === 'canjeado') {
                errorDiv.textContent = 'Este cupón ya ha sido canjeado';
                return;
            }

            // Generar número de boleta y obtener fecha/hora
            numeroBoletaActual = generarNumeroBoleta();
            const { fecha, hora, timestamp } = obtenerFechaHoraActual();

            // Actualizar el cupón a estado 'canjeado' con toda la información
            const { error: errorActualizacionCupon } = await supabase
                .from('cupones')
                .update({ 
                    estado: 'canjeado', 
                    fecha_canje: timestamp.toISOString(),
                    dni_cliente: clienteDniActual,
                    sede: 'Larco',
                    numero_boleta: numeroBoletaActual
                })
                .eq('id', cupon.id);

            if (errorActualizacionCupon) {
                throw errorActualizacionCupon;
            }

            // Bloquear al cliente en la tabla 'clientes'
            const { error: errorBloqueoCliente } = await supabase
                .from('clientes')
                .update({ bloqueado: true })
                .eq('id', clienteActual.id);

            if (errorBloqueoCliente) {
                throw errorBloqueoCliente;
            }

            // Mostrar detalles del canje
            document.getElementById('detalleSede').textContent = 'Larco';
            document.getElementById('detalleFecha').textContent = fecha;
            document.getElementById('detalleHora').textContent = hora;
            document.getElementById('detalleBoleta').textContent = numeroBoletaActual;

            // Mostrar mensaje de éxito
            document.getElementById('pasoCupon').style.display = 'none';
            document.getElementById('infoExito').style.display = 'block';
            document.getElementById('detallesCanje').style.display = 'block';
            document.getElementById('botonesFinales').style.display = 'flex';

        } catch (error) {
            console.error('Error al canjear cupón:', error);
            errorDiv.textContent = 'Error al canjear: ' + error.message;
        }
    }

    // ===== RESETEAR FORMULARIO (Canjear Otro) =====
    function resetearFormulario() {
        document.getElementById('numeroCuponInput').value = '';
        document.getElementById('dniInput').value = '';
        document.getElementById('errorDNI').textContent = '';
        document.getElementById('errorCupon').textContent = '';
        document.getElementById('infoDniValidado').style.display = 'none';
        document.getElementById('infoExito').style.display = 'none';
        document.getElementById('detallesCanje').style.display = 'none';
        document.getElementById('botonesFinales').style.display = 'none';
        document.getElementById('pasoDNI').style.display = 'block';
        document.getElementById('pasoCupon').style.display = 'none';
        
        clienteDniActual = null;
        clienteActual = null;
        numeroBoletaActual = null;
        document.getElementById('dniInput').focus();
    }

    // ===== CERRAR SESIÓN =====
    function cerrarSesion() {
        document.getElementById('pantallaCanje').style.display = 'none';
        document.getElementById('pantallaLogin').style.display = 'block';
        document.getElementById('passTienda').value = '';
        limpiarFormulario();
    }

    // ===== LIMPIAR FORMULARIO =====
    function limpiarFormulario() {
        document.getElementById('dniInput').value = '';
        document.getElementById('numeroCuponInput').value = '';
        document.getElementById('errorDNI').textContent = '';
        document.getElementById('errorCupon').textContent = '';
        document.getElementById('infoDniValidado').style.display = 'none';
        document.getElementById('infoExito').style.display = 'none';
        document.getElementById('detallesCanje').style.display = 'none';
        document.getElementById('botonesFinales').style.display = 'none';
        document.getElementById('pasoDNI').style.display = 'block';
        document.getElementById('pasoCupon').style.display = 'none';
        
        clienteDniActual = null;
        clienteActual = null;
        numeroBoletaActual = null;
    }

    // ===== INICIALIZAR AL CARGAR LA PÁGINA =====
    window.addEventListener('DOMContentLoaded', () => {
        inicializarSupabase();
    });
</script>

</body>
</html>
