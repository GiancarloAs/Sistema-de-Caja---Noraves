<script>
  async function buscarCodigo() {
      const input = document.getElementById("codigoInput");
      codigoActual = input.value.trim().toUpperCase();
      
      const errorMsg = document.getElementById("errorMsg");
      const seccionCliente = document.getElementById("seccionCliente");
      
      errorMsg.innerText = "";
      seccionCliente.style.display = "none";

      if (!codigoActual) return;

      // Consulta: Trae estado y los datos del cliente relacionado
      const { data, error } = await _supabase
        .from('cupones')
        .select(`
            estado, 
            clientes (
                nombre, 
                dni, 
                empresa
            )
        `)
        .eq('codigo', codigoActual)
        .maybeSingle();

      if (error) {
          errorMsg.innerText = "❌ Error de conexión: " + error.message;
          return;
      }
      
      if (!data) {
          errorMsg.innerText = "❌ Código no encontrado.";
          return;
      }

      // Si el cupón existe pero no tiene cliente asignado (por seguridad)
      if (!data.clientes) {
          errorMsg.innerText = "⚠️ Cupón encontrado pero sin datos de cliente.";
          return;
      }

      document.getElementById("nombreCliente").innerText = data.clientes.nombre;
      document.getElementById("empresaCliente").innerText = data.clientes.empresa;
      
      // Guardamos los últimos 3 dígitos para validación
      ultimosDigitosDniCorrectos = data.clientes.dni.toString().trim().slice(-3);

      seccionCliente.style.display = "block";
      
      if (data.estado === 'canjeado') {
          document.getElementById("estadoCodigo").innerHTML = "<span style='color:red;'>YA CANJEADO</span>";
          document.getElementById("btnCanjear").disabled = true;
      } else {
          document.getElementById("estadoCodigo").innerHTML = "<span style='color:green;'>DISPONIBLE</span>";
          document.getElementById("bloqueSeguridad").style.display = "block";
          document.getElementById("seccionBoleta").style.display = "block";
          document.getElementById("btnCanjear").disabled = true;
      }
  }
</script>
