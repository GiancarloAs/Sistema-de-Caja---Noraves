<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Caja - Canjes Ultraseguros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 420px; text-align: center; }
        input { width: 85%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; text-align: center; }
        input[type="text"] { text-transform: uppercase; }
        button { width: 90%; padding: 12px; background: #24b47e; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        .info-cliente { margin-top: 20px; padding: 15px; border-radius: 4px; background: #eef9f5; display: none; text-align: left; }
        .alerta { color: red; margin-top: 10px; font-weight: bold; }
        .tienda-tag { background: #24b47e; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; float: right; font-weight: bold; }
    </style>
</head>
<body>

<div id="pantallaLogin" class="card">
    <h2>Acceso: Tienda Larco</h2>
    <input type="password" id="passTienda" placeholder="Contraseña de cajero">
    <button onclick="loginTienda()">Ingresar</button>
    <div id="errorLogin" class="alerta"></div>
</div>

<div id="pantallaCanje" class="card" style="display: none;">
    <div>
        <span class="tienda-tag">Tienda Larco</span>
        <h2 style="text-align: left; margin-top: 0;">Validación</h2>
    </div>
    <input type="text" id="codigoInput" placeholder="Introduce el código">
    <button id="btnBuscar" onclick="buscarCodigo()">Buscar Código</button>
    <div id="errorMsg" class="alerta"></div>

    <div id="seccionCliente" class="info-cliente">
        <p><strong>Cliente:</strong> <span id="nombreCliente"></span></p>
        <p><strong>Empresa:</strong> <span id="empresaCliente"></span></p>
        <p><strong>Estado:</strong> <span id="estadoCodigo"></span></p>
        <button id="btnCanjear" onclick="canjearCodigo()">Procesar Canje</button>
    </div>
    <p style="margin-top: 25px;"><a href="#" onclick="location.reload()">Cerrar Sesión</a></p>
</div>

<script>
  const _supabase = supabase.createClient("TU_URL_AQUI", "TU_KEY_AQUI");

  function loginTienda() {
      const pass = document.getElementById("passTienda").value;
      // Solo contraseña para Tienda Larco
      if (pass === "tienlar01") {
          document.getElementById("pantallaLogin").style.display = "none";
          document.getElementById("pantallaCanje").style.display = "block";
      } else {
          document.getElementById("errorLogin").innerText = "❌ Contraseña incorrecta.";
      }
  }

  async function buscarCodigo() {
      const codigo = document.getElementById("codigoInput").value.trim().toUpperCase();
      const { data, error } = await _supabase
          .from('cupones')
          .select('estado, nombre_cliente, empresa') // Ajusta estos nombres a los de tu tabla
          .eq('codigo', codigo)
          .maybeSingle();

      if (error || !data) {
          document.getElementById("errorMsg").innerText = "❌ Código no encontrado.";
          return;
      }

      document.getElementById("nombreCliente").innerText = data.nombre_cliente || "N/A";
      document.getElementById("empresaCliente").innerText = data.empresa || "N/A";
      document.getElementById("estadoCodigo").innerText = data.estado;
      document.getElementById("seccionCliente").style.display = "block";
      document.getElementById("errorMsg").innerText = "";
  }

  async function canjearCodigo() {
      alert("Lógica de actualización pendiente");
  }
</script>
</body>
</html>
